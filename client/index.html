<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="manifest" href="/controle-financeiro-pwa/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/controle-financeiro-pwa/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/controle-financeiro-pwa/icon-512.png">
    <link rel="apple-touch-icon" href="/controle-financeiro-pwa/icon-192.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#1D4ED8" />
    <meta name="description" content="App de controle financeiro pessoal — Fluxo Diário e Capital de Giro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Controle Financeiro" />
    <title>Controle Financeiro Pessoal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <!-- O bloco que faltava para ativar a instalação no celular -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/controle-financeiro-pwa/sw.js')
            .then(reg => console.log('Service Worker registrado com sucesso!', reg))
            .catch(err => console.log('Falha ao registrar o Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
